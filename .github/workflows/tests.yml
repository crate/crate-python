name: Tests

on:
  push:
    branches: [ main ]
  pull_request: ~
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "Python: ${{ matrix.python-version }}
     on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-22.04']
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
        cratedb-version: ['nightly']

        # To save resources, only verify other variants particularly.
        include:

          # Older CrateDB versions.
          - os: 'ubuntu-latest'
            cratedb-version: '4.8.4'
            python-version: '3.14'

          # macOS/Intel
          - os: 'macos-15-intel'
            cratedb-version: 'nightly'
            python-version: '3.14'

          # macOS/ARM
          - os: 'macos-latest'
            cratedb-version: 'nightly'
            python-version: '3.14'

          # Linux/ARM
          - os: 'ubuntu-latest-arm'
            cratedb-version: 'nightly'
            python-version: '3.14'

    env:
      CRATEDB_VERSION: ${{ matrix.cratedb-version }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          cache-dependency-glob: |
            pyproject.toml
          cache-suffix: ${{ matrix.python-version }}
          enable-cache: true
          version: "latest"

      - name: Setup env
        run: uv sync

      - name: Invoke tests
        run: |
        
          # Propagate build matrix information.
          ./devtools/setup_ci.sh

          # Bootstrap environment.
          source bootstrap.sh
          
          # Report about the test matrix slot.
          echo "Invoking tests with CrateDB ${CRATEDB_VERSION}"

          # Run linter.
          poe lint

          # Run tests.
          poe test

      # https://github.com/codecov/codecov-action
      - name: Upload coverage results to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          fail_ci_if_error: true
